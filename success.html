<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付成功 · AutoPhoto</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">AutoPhoto<span class="logo-dot">.store</span></a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="index.html#plugins">插件</a>
        <a href="pricing.html">定价</a>
        <a href="about.html">关于</a>
      </div>
      <a href="index.html" class="btn btn-primary btn-sm">返回首页</a>
    </div>
  </nav>

  <div class="result-page">
    <div class="result-card">
      <div class="result-icon">🎉</div>
      <h2 id="page-title">支付成功！</h2>
      <p id="page-message">感谢您的购买！授权码已发送到您的邮箱。<br>如未收到邮件，请使用下方"查询授权码"功能。</p>

      <!-- 订单信息 -->
      <div id="order-info" style="background:rgba(99,102,241,0.08);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:left;font-size:14px;color:var(--text-muted);margin-bottom:16px;">
        <div style="margin-bottom:6px;"><strong>订单号：</strong><span id="order-no">—</span></div>
        <div style="margin-bottom:6px;"><strong>插件：</strong><span id="plugins-list">—</span></div>
        <div style="margin-bottom:6px;"><strong>授权类型：</strong><span id="plan-name">—</span></div>
        <div style="margin-bottom:6px;"><strong>金额：</strong><span id="amount">—</span></div>
        <div><strong>邮箱：</strong><span id="email">—</span></div>
      </div>

      <!-- 授权码展示 -->
      <div id="codes-section" style="display:none;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:16px;margin-bottom:16px;">
        <div style="font-weight:700;color:#10b981;margin-bottom:8px;">🔑 您的授权码：</div>
        <div id="codes-list" style="font-family:monospace;color:#818cf8;font-size:15px;"></div>
        <div style="margin-top:10px;font-size:13px;color:var(--text-muted);">⚠️ 请妥善保管，切勿泄露。每个码绑定一台设备。</div>
      </div>

      <!-- 查询授权码（备用） -->
      <div style="border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;">
        <h4 style="margin:0 0 12px;font-size:15px;">📧 未收到邮件？手动查询授权码</h4>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input type="text" id="query-email" placeholder="购买时填写的邮箱" style="flex:1;min-width:160px;padding:10px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-primary);color:var(--text-primary);font-size:14px;">
          <button id="query-btn" onclick="queryLicense()" style="padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;white-space:nowrap;">查询授权码</button>
        </div>
        <div id="query-result" style="margin-top:10px;font-size:13px;"></div>
      </div>

      <div style="display:flex;gap:12px;margin-top:8px;">
        <a href="index.html" class="btn btn-outline btn-block">返回首页</a>
        <a href="pricing.html" class="btn btn-primary btn-block">继续购买</a>
      </div>
      <p class="text-sm text-muted" style="margin-top:16px;">💬 有问题？微信：auto_photo2025 · 邮件：tourinn@gmail.com</p>
    </div>
  </div>

  <script>
    const PLUGIN_NAMES = {
      shijuezhongguo: '视觉中国自动提交',
      guangchang: '光厂批量提交助手',
      xinchangchang: '新片场 AIGC 助手',
      dreamstime: 'Dreamstime 自动提交',
      'adobe-stock': 'Adobe Stock 关键词点击器',
      'qingying-image': '清影批量生图助手',
      'qingying-video': '清影批量生视频助手'
    };
    const PLUGIN_PREFIXES = {
      VCG: 'shijuezhongguo', VJ: 'guangchang', XC: 'xinchangchang',
      DT: 'dreamstime', AS: 'adobe-stock', QY: 'qingying-image', QV: 'qingying-video'
    };
    const PLAN_LABELS = {
      test001: '🔧调试测试', testpay: '🔷真实支付测试',
      trial: '1天试用', annual: '年度授权', permanent: '永久授权'
    };

    // 从码前缀还原插件标注
    function getCodeLabel(code, plugins) {
      if (!code) return '[未知]';
      const prefix = code.split('-')[1]; // e.g. "VCG"
      const pid = PLUGIN_PREFIXES[prefix];
      if (pid) return `[${PLUGIN_NAMES[pid] || pid}]`;
      if (plugins && plugins.length > 0) {
        return `[${PLUGIN_NAMES[plugins[0]] || plugins[0]}]`;
      }
      return '[未知插件]';
    }

    // 当前页面的插件列表（从 localStorage 恢复）
    let pagePlugins = [];

    const params = new URLSearchParams(window.location.search);
    const orderNo = params.get('order');
    const status = params.get('status');
    const codesParam = params.get('codes');

    // 尝试从 URL 参数读取授权码（虎皮椒回调后通过 return_url 传来）
    if (codesParam) {
      try {
        const codes = JSON.parse(atob(decodeURIComponent(codesParam)));
        if (codes && codes.length > 0) {
          showCodes(codes);
          console.log('[Success] 从URL参数读取到授权码:', codes);
        }
      } catch (e) {
        console.warn('[Success] 解析URL授权码失败:', e.message);
      }
    }

    // 尝试从 localStorage 恢复订单信息（兜底）
    // 尝试从 localStorage 恢复订单信息（兜底）
    const orderData = orderNo ? localStorage.getItem('autophoto_order_' + orderNo) : null;

    if (orderNo) {
      document.getElementById('order-no').textContent = orderNo;

      if (orderData) {
        try {
          const o = JSON.parse(orderData);
          pagePlugins = o.plugins || [];
          document.getElementById('plugins-list').textContent =
            pagePlugins.map(p => PLUGIN_NAMES[p] || p).join('、');
          document.getElementById('plan-name').textContent = o.planName || PLAN_LABELS[o.plan] || o.plan || '—';
          document.getElementById('amount').textContent = o.total ? `¥${o.total}` : '—';
          document.getElementById('email').textContent = o.email || '—';
          document.getElementById('query-email').value = o.email || '';

          // 如果URL没有授权码，但localStorage有，显示它
          if (!codesParam && o.licenseCodes && o.licenseCodes.length > 0) {
            showCodes(o.licenseCodes);
          }
        } catch (e) {
          console.warn('无法解析订单数据');
        }
      }
    }

    // 显示授权码（带插件标注）
    function showCodes(codes) {
      const section = document.getElementById('codes-section');
      const list = document.getElementById('codes-list');
      section.style.display = 'block';
      list.innerHTML = codes.map(c => {
        const label = getCodeLabel(c, pagePlugins);
        return `<div style="margin:4px 0;">
          <span style="color:#94a3b8;font-size:12px;">${label}</span><br>
          <span style="background:#1a1a2e;padding:8px 16px;border-radius:6px;display:inline-block;margin-top:2px;font-family:monospace;color:#818cf8;font-size:15px;letter-spacing:1px;">${c}</span>
        </div>`;
      }).join('');
    }

    // 手动查询授权码
    async function queryLicense() {
      const email = document.getElementById('query-email').value.trim();
      const resultDiv = document.getElementById('query-result');

      if (!email) {
        resultDiv.innerHTML = '<span style="color:#f59e0b;">⚠️ 请输入邮箱地址</span>';
        return;
      }

      const btn = document.getElementById('query-btn');
      btn.disabled = true;
      btn.textContent = '⏳ 查询中...';
      resultDiv.innerHTML = '';

      try {
        const API_BASE = 'https://autophoto-store.vercel.app';
        const resp = await fetch(API_BASE + '/api/license-query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await resp.json();

        if (data.success && data.codes && data.codes.length > 0) {
          showCodes(data.codes);
          resultDiv.innerHTML = '<span style="color:#10b981;">✅ 找到 ' + data.codes.length + ' 个授权码</span>';
        } else {
          resultDiv.innerHTML = '<span style="color:#f59e0b;">⚠️ 未找到订单，请确认邮箱是否正确，或联系微信 auto_photo2025</span>';
        }
      } catch (err) {
        resultDiv.innerHTML = '<span style="color:#ef4444;">❌ 查询失败，请稍后重试</span>';
      } finally {
        btn.disabled = false;
        btn.textContent = '查询授权码';
      }
    }
  </script>
</body>
</html>

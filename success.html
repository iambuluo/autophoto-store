<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付成功 · AutoPhoto</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">AutoPhoto<span class="logo-dot">.store</span></a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="index.html#plugins">插件</a>
        <a href="pricing.html">定价</a>
        <a href="about.html">关于</a>
      </div>
      <a href="index.html" class="btn btn-primary btn-sm">返回首页</a>
    </div>
  </nav>

  <div class="result-page">
    <div class="result-card">
      <div class="result-icon">🎉</div>
      <h2 id="page-title">支付成功！</h2>
      <p id="page-message">感谢您的购买！授权码已发送到您的邮箱。<br>如未收到邮件，请检查垃圾箱或联系微信 <strong>auto_photo2025</strong>。</p>
      <div id="order-info" style="background:rgba(99,102,241,0.08);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:left;font-size:14px;color:var(--text-muted);margin-bottom:16px;">
        <div style="margin-bottom:6px;"><strong>订单号：</strong><span id="order-no">—</span></div>
        <div style="margin-bottom:6px;"><strong>插件：</strong><span id="plugins-list">—</span></div>
        <div style="margin-bottom:6px;"><strong>授权类型：</strong><span id="plan-name">—</span></div>
        <div style="margin-bottom:6px;"><strong>金额：</strong><span id="amount">—</span></div>
        <div><strong>邮箱：</strong><span id="email">—</span></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <a href="index.html" class="btn btn-outline btn-block">返回首页</a>
        <a href="pricing.html" class="btn btn-primary btn-block">继续购买</a>
      </div>
      <p class="text-sm text-muted" style="margin-top:16px;">💬 有问题？微信：auto_photo2025 · 邮件：tourinn@gmail.com</p>
    </div>
  </div>

  <script>
    const PLUGIN_NAMES = {
      shijuezhongguo: '视觉中国自动提交',
      guangchang: '光厂批量提交助手',
      xinchangchang: '新片场 AIGC 助手',
      dreamstime: 'Dreamstime 自动提交',
      'adobe-stock': 'Adobe Stock 关键词点击器',
      'qingying-image': '清影批量生图助手',
      'qingying-video': '清影批量生视频助手'
    };

    const PLAN_LABELS = {
      test001: '🔧调试测试', trial: '1天试用',
      annual: '年度授权', permanent: '永久授权'
    };

    const params = new URLSearchParams(window.location.search);
    const orderNo = params.get('order');
    const status = params.get('status');

    // 从 localStorage 读取订单信息（在 buy.html 下单时存入）
    const orderData = orderNo ? localStorage.getItem('autophoto_order_' + orderNo) : null;

    if (orderNo) {
      document.getElementById('order-no').textContent = orderNo;

      if (orderData) {
        try {
          const o = JSON.parse(orderData);
          document.getElementById('plugins-list').textContent =
            (o.plugins || []).map(p => PLUGIN_NAMES[p] || p).join('、');
          document.getElementById('plan-name').textContent = o.planName || PLAN_LABELS[o.plan] || o.plan || '—';
          document.getElementById('amount').textContent = o.total ? `¥${o.total}` : '—';
          document.getElementById('email').textContent = o.email || '—';
        } catch (e) {
          console.warn('无法解析订单数据');
        }
      }

      // 清理 localStorage（订单已处理）
      if (status === 'paid' || status === 'demo') {
        localStorage.removeItem('autophoto_order_' + orderNo);
      }
    } else {
      // 无订单号，检查是否为演示模式
      const demoCode = params.get('codes');
      if (demoCode) {
        document.getElementById('order-no').textContent = params.get('orderNo') || 'DEMO';
      }
    }
  </script>
</body>
</html>

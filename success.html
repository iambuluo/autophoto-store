<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="success.title">支付成功 · AutoPhoto</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 语言切换 -->
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="zh">🇨🇳 中文</button>
    <button class="lang-btn" data-lang="en">🇺🇸 English</button>
  </div>

  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">AutoPhoto<span class="logo-dot">.store</span></a>
      <div class="nav-links">
        <a href="index.html" data-i18n="nav.home">首页</a>
        <a href="index.html#plugins" data-i18n="nav.plugins">插件</a>
        <a href="pricing.html" data-i18n="nav.pricing">定价</a>
        <a href="about.html" data-i18n="nav.about">关于</a>
      </div>
      <a href="index.html" class="btn btn-primary btn-sm" data-i18n="success.back">返回首页</a>
    </div>
  </nav>

  <div class="result-page">
    <div class="result-card">
      <div class="result-icon">🎉</div>
      <h2 id="page-title">支付成功！</h2>
      <p id="page-message">感谢您的购买！授权码已发送到您的邮箱。<br>如未收到邮件，请使用下方"查询授权码"功能。</p>

      <!-- 订单信息 -->
      <div id="order-info" style="background:rgba(99,102,241,0.08);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:left;font-size:14px;color:var(--text-muted);margin-bottom:16px;">
        <div style="margin-bottom:6px;"><strong data-i18n-zh="订单号：" data-i18n-en="Order No:">订单号：</strong><span id="order-no">—</span></div>
        <div style="margin-bottom:6px;"><strong data-i18n-zh="插件：" data-i18n-en="Plugins:">插件：</strong><span id="plugins-list">—</span></div>
        <div style="margin-bottom:6px;"><strong data-i18n-zh="授权类型：" data-i18n-en="License:">授权类型：</strong><span id="plan-name">—</span></div>
        <div style="margin-bottom:6px;"><strong data-i18n-zh="金额：" data-i18n-en="Amount:">金额：</strong><span id="amount">—</span></div>
        <div><strong>Email：</strong><span id="email">—</span></div>
      </div>

      <!-- 授权码展示 -->
      <div id="codes-section" style="display:none;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:16px;margin-bottom:16px;">
        <div style="font-weight:700;color:#10b981;margin-bottom:8px;" data-i18n="success.code.label">🔑 您的授权码：</div>
        <div id="codes-list" style="font-family:monospace;color:#818cf8;font-size:15px;"></div>
        <div style="margin-top:10px;font-size:13px;color:var(--text-muted);" data-i18n-zh="⚠️ 请妥善保管，切勿泄露。每个码绑定一台设备。" data-i18n-en="⚠️ Keep it safe. Each key is bound to one device.">⚠️ 请妥善保管，切勿泄露。每个码绑定一台设备。</div>
      </div>

      <!-- 查询授权码（备用） -->
      <div style="border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;">
        <h4 style="margin:0 0 12px;font-size:15px;" data-i18n-zh="📧 未收到邮件？手动查询授权码" data-i18n-en="📧 Didn't receive email? Look up your license key">📧 未收到邮件？手动查询授权码</h4>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input type="text" id="query-email" data-i18n-zh-placeholder="购买时填写的邮箱" data-i18n-en-placeholder="Email used at checkout" placeholder="购买时填写的邮箱" style="flex:1;min-width:160px;padding:10px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-primary);color:var(--text-primary);font-size:14px;">
          <button id="query-btn" onclick="queryLicense()" style="padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;white-space:nowrap;" data-i18n-zh="查询授权码" data-i18n-en="Look Up">查询授权码</button>
        </div>
        <div id="query-result" style="margin-top:10px;font-size:13px;"></div>
      </div>

      <div style="display:flex;gap:12px;margin-top:8px;">
        <a href="index.html" class="btn btn-outline btn-block" data-i18n="success.back">返回首页</a>
        <a href="pricing.html" class="btn btn-primary btn-block" data-i18n-zh="继续购买" data-i18n-en="Buy More">继续购买</a>
      </div>
      <p class="text-sm text-muted" style="margin-top:16px;" data-i18n-zh="💬 有问题？微信：auto_photo2025 · 邮件：tourinn@gmail.com" data-i18n-en="💬 Need help? WeChat: auto_photo2025 · Email: tourinn@gmail.com">💬 有问题？微信：auto_photo2025 · 邮件：tourinn@gmail.com</p>
    </div>
  </div>

  <script>
    const currentLang = localStorage.getItem('ap_lang') || 'zh';
    const PLUGIN_NAMES_ZH = {
      shijuezhongguo: '视觉中国自动提交', guangchang: '光厂批量提交助手',
      xinchangchang: '新片场 AIGC 助手', dreamstime: 'Dreamstime 自动提交',
      'adobe-stock': 'Adobe Stock 关键词点击器',
      'qingying-image': '清影批量生图助手', 'qingying-video': '清影批量生视频助手'
    };
    const PLUGIN_NAMES_EN = {
      shijuezhongguo: 'Visual China Auto Submit', guangchang: 'Guang Chang Batch Submit',
      xinchangchang: 'Xinchangchang AIGC', dreamstime: 'Dreamstime Auto Submit',
      'adobe-stock': 'Adobe Stock Keyword Clicker',
      'qingying-image': 'Qingying Image Gen', 'qingying-video': 'Qingying Video Gen'
    };
    const PLUGIN_PREFIXES = {
      VCG: 'shijuezhongguo', VJ: 'guangchang', XC: 'xinchangchang',
      DT: 'dreamstime', AS: 'adobe-stock', QY: 'qingying-image', QV: 'qingying-video'
    };
    const PLAN_LABELS_ZH = { testpay: '测试', trial: '1天试用', annual: '年度授权', permanent: '永久授权' };
    const PLAN_LABELS_EN = { testpay: 'Test', trial: '1-Day Trial', annual: 'Annual', permanent: 'Lifetime' };

    function getNames() { return currentLang === 'en' ? PLUGIN_NAMES_EN : PLUGIN_NAMES_ZH; }
    function getPlanLabels() { return currentLang === 'en' ? PLAN_LABELS_EN : PLAN_LABELS_ZH; }

    function getCodeLabel(code, plugins) {
      if (!code) return '';
      const prefix = code.split('-')[1];
      const pid = PLUGIN_PREFIXES[prefix];
      if (pid) return `[${getNames()[pid] || pid}]`;
      if (plugins && plugins.length > 0) return `[${getNames()[plugins[0]] || plugins[0]}]`;
      return '';
    }

    let pagePlugins = [];
    const params = new URLSearchParams(window.location.search);
    const orderNo = params.get('order');
    const codesParam = params.get('codes');

    if (codesParam) {
      try {
        const codes = JSON.parse(atob(decodeURIComponent(codesParam)));
        if (codes && codes.length > 0) showCodes(codes);
      } catch (e) { console.warn('解析URL授权码失败:', e.message); }
    }

    const orderData = orderNo ? localStorage.getItem('autophoto_order_' + orderNo) : null;
    if (orderNo) {
      document.getElementById('order-no').textContent = orderNo;
      if (orderData) {
        try {
          const o = JSON.parse(orderData);
          pagePlugins = o.plugins || [];
          document.getElementById('plugins-list').textContent =
            pagePlugins.map(p => getNames()[p] || p).join(currentLang === 'en' ? ', ' : '、');
          document.getElementById('plan-name').textContent = getPlanLabels()[o.plan] || o.plan || '—';
          document.getElementById('amount').textContent = o.total ? `¥${o.total}` : '—';
          document.getElementById('email').textContent = o.email || '—';
          document.getElementById('query-email').value = o.email || '';
          if (!codesParam && o.licenseCodes && o.licenseCodes.length > 0) showCodes(o.licenseCodes);
        } catch(e) {}
      }
    }

    function showCodes(codes) {
      const section = document.getElementById('codes-section');
      const list = document.getElementById('codes-list');
      section.style.display = 'block';
      list.innerHTML = codes.map(c => {
        const label = getCodeLabel(c, pagePlugins);
        return `<div style="margin:4px 0;">
          ${label ? `<span style="color:#94a3b8;font-size:12px;">${label}</span><br>` : ''}
          <span style="background:#1a1a2e;padding:8px 16px;border-radius:6px;display:inline-block;margin-top:2px;font-family:monospace;color:#818cf8;font-size:15px;letter-spacing:1px;">${c}</span>
        </div>`;
      }).join('');
    }

    async function queryLicense() {
      const email = document.getElementById('query-email').value.trim();
      const resultDiv = document.getElementById('query-result');
      if (!email) {
        resultDiv.innerHTML = `<span style="color:#f59e0b;">⚠️ ${currentLang === 'en' ? 'Please enter your email' : '请输入邮箱地址'}</span>`;
        return;
      }
      const btn = document.getElementById('query-btn');
      btn.disabled = true;
      btn.textContent = currentLang === 'en' ? '⏳ Looking up...' : '⏳ 查询中...';
      try {
        const resp = await fetch('/api/license-query', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await resp.json();
        if (data.success && data.codes && data.codes.length > 0) {
          showCodes(data.codes);
          resultDiv.innerHTML = `<span style="color:#10b981;">✅ ${currentLang === 'en' ? 'Found ' + data.codes.length + ' license key(s)' : '找到 ' + data.codes.length + ' 个授权码'}</span>`;
        } else {
          resultDiv.innerHTML = `<span style="color:#f59e0b;">⚠️ ${currentLang === 'en' ? 'Not found. Check your email or contact WeChat: auto_photo2025' : '未找到订单，请确认邮箱或联系微信 auto_photo2025'}</span>`;
        }
      } catch(err) {
        resultDiv.innerHTML = `<span style="color:#ef4444;">❌ ${currentLang === 'en' ? 'Query failed, please retry.' : '查询失败，请稍后重试'}</span>`;
      } finally {
        btn.disabled = false;
        btn.textContent = currentLang === 'en' ? 'Look Up' : '查询授权码';
      }
    }
  </script>
  <script src="/js/i18n.js"></script>
</body>
</html>

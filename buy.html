  <script src="/js/main.js"></script>
  <script>
    // 价格配置（CNY / USD 双币）
    const PLAN_PRICES_CNY = { testpay: 0.01, trial: 9.9, annual: 199, permanent: 399 };
    const PLAN_PRICES_USD = { testpay: 0.01, trial: 1.5, annual: 29, permanent: 69 };
    const DISCOUNTS = { 1: 1.0, 2: 0.88, 3: 0.80, 4: 0.70, 5: 0.60, 6: 0.60, 7: 0.50 };

    const PLUGIN_NAMES_ZH = {
      shijuezhongguo: '视觉中国自动提交', guangchang: '光厂批量提交助手',
      xinchangchang: '新片场 AIGC 助手', dreamstime: 'Dreamstime 自动提交',
      'adobe-stock': 'Adobe Stock 关键词点击器',
      'qingying-image': '清影批量生图助手', 'qingying-video': '清影批量生视频助手'
    };
    const PLUGIN_NAMES_EN = {
      shijuezhongguo: 'Visual China Auto Submit', guangchang: 'Guang Chang Batch Submit',
      xinchangchang: 'Xinchangchang AIGC', dreamstime: 'Dreamstime Auto Submit',
      'adobe-stock': 'Adobe Stock Keyword Clicker',
      'qingying-image': 'Qingying Image Gen', 'qingying-video': 'Qingying Video Gen'
    };

    let selectedPlugins = [];
    let selectedPlan = 'annual';
    let currentLang = localStorage.getItem('ap_lang') || 'zh';

    // 从URL参数中获取插件ID并自动选择
    function autoSelectPlugin() {
      const params = new URLSearchParams(window.location.search);
      const pluginParam = params.get('plugin');
      if (pluginParam) {
        const pluginCard = document.querySelector(`.plugin-select-card[data-plugin="${pluginParam}"]`);
        if (pluginCard) {
          const checkbox = pluginCard.querySelector('input[type="checkbox"]');
          if (checkbox && !checkbox.checked) {
            checkbox.checked = true;
            pluginCard.classList.add('selected');
            updateSummary();
          }
        }
      }
    }

    // 页面加载完成后自动选择插件
    window.addEventListener('DOMContentLoaded', autoSelectPlugin);

    function getPluginNames() { return currentLang === 'en' ? PLUGIN_NAMES_EN : PLUGIN_NAMES_ZH; }
    function getPlanPrices() { return currentLang === 'en' ? PLAN_PRICES_USD : PLAN_PRICES_CNY; }
    function getCurrencySymbol() { return currentLang === 'en' ? '$' : '¥'; }

    // 插件选择
    document.querySelectorAll('.plugin-select-card').forEach(card => {
      const cb = card.querySelector('input[type="checkbox"]');
      cb.addEventListener('change', () => {
        card.classList.toggle('selected', cb.checked);
        updateSummary();
      });
    });

    // 方案选择
    document.querySelectorAll('.plan-select-card').forEach(card => {
      const radio = card.querySelector('input[type="radio"]');
      radio.addEventListener('change', () => {
        if (!radio.checked) return;
        document.querySelectorAll('.plan-select-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedPlan = card.dataset.plan;
        updateSummary();
      });
    });

    function updateSummary() {
      const PRICES = getPlanPrices();
      const SYM = getCurrencySymbol();
      const NAMES = getPluginNames();

      selectedPlugins = Array.from(document.querySelectorAll('input[name="plugins"]:checked')).map(cb => cb.value);
      const count = selectedPlugins.length;
      const discount = DISCOUNTS[count] || 1.0;
      const unitPrice = PRICES[selectedPlan];
      const total = (unitPrice * count * discount).toFixed(2);
      const saving = (unitPrice * count * (1 - discount)).toFixed(2);

      const summaryPlugins = document.getElementById('summary-plugins');
      if (count === 0) {
        summaryPlugins.textContent = currentLang === 'en' ? 'Please select plugins' : '请选择插件';
      } else if (count <= 3) {
        summaryPlugins.textContent = selectedPlugins.map(p => NAMES[p] || p).join(currentLang === 'en' ? ', ' : '、');
      } else {
        summaryPlugins.textContent = currentLang === 'en'
          ? `${count} plugins selected`
          : `已选 ${count} 个插件`;
      }

      const discountEl = document.getElementById('summary-discount');
      if (count <= 1) {
        discountEl.textContent = '—';
      } else {
        discountEl.textContent = currentLang === 'en'
          ? `${Math.round((1 - discount) * 100)}% off (save ${SYM}${saving})`
          : `${Math.round(discount * 10)}折（节省${SYM}${saving}）`;
      }

      const planLabels = {
        zh: { testpay: '¥0.01 测试', trial: '1天试用', annual: '年度授权', permanent: '永久授权' },
        en: { testpay: '$0.01 Test', trial: '1-Day Trial', annual: 'Annual', permanent: 'Lifetime' }
      };
      document.getElementById('summary-plan').textContent = planLabels[currentLang][selectedPlan];
      document.getElementById('summary-total').textContent = SYM + total;
      document.getElementById('btn-price').textContent = total;
      document.getElementById('currency-symbol').textContent = SYM;

      // 更新方案卡片价格显示
      updatePlanCardPrices();
    }

    function updatePlanCardPrices() {
      const PRICES = getPlanPrices();
      const SYM = getCurrencySymbol();
      const priceConfigs = {
        testpay: { main: SYM + '0.01', suffix: '' },
        trial:   { main: SYM + PRICES.trial, suffix: currentLang === 'en' ? '' : '' },
        annual:  { main: SYM + PRICES.annual, suffix: currentLang === 'en' ? '/plugin/yr' : '/插件/年' },
        permanent: { main: SYM + PRICES.permanent, suffix: currentLang === 'en' ? '/plugin' : '/插件' },
      };
      Object.entries(priceConfigs).forEach(([plan, config]) => {
        const el = document.querySelector(`.psc-price-${plan}`);
        if (el) el.innerHTML = `${config.main}<span>${config.suffix}</span>`;
      });

      // 更新 data-i18n-zh/en 的内联元素
      document.querySelectorAll('[data-i18n-zh]').forEach(el => {
        const key = `data-i18n-${currentLang}`;
        if (el.hasAttribute(key)) el.innerHTML = el.getAttribute(key);
      });
      document.querySelectorAll('[data-i18n-zh-placeholder]').forEach(el => {
        const key = `data-i18n-${currentLang}-placeholder`;
        if (el.hasAttribute(key)) el.placeholder = el.getAttribute(key);
      });
    }

    // 监听语言切换（由 i18n.js 触发后更新价格）
    document.addEventListener('langChanged', (e) => {
      currentLang = e.detail.lang;
      updateSummary();
    });

    updateSummary();

    // ============ 支付处理 ============
    async function handleCheckout(e) {
      e.preventDefault();
      if (selectedPlugins.length === 0) {
        alert(currentLang === 'en' ? 'Please select at least one plugin!' : '请至少选择一个插件！');
        return;
      }
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const wechat = document.getElementById('wechat').value;
      const notes = document.getElementById('notes').value;
      const count = selectedPlugins.length;
      const discount = DISCOUNTS[count] || 1.0;
      const PRICES = getPlanPrices();
      const SYM = getCurrencySymbol();
      const total = (PRICES[selectedPlan] * count * discount).toFixed(2);

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = currentLang === 'en' ? '⏳ Creating order...' : '⏳ 正在创建订单...';

      try {
        // 英文界面 → Stripe（信用卡），中文界面 → 虎皮椒（微信/支付宝）
        const useStripe = currentLang === 'en';
        const apiEndpoint = useStripe ? '/api/stripe/create-checkout' : '/api/order-create';

        const resp = await fetch(apiEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ plugins: selectedPlugins, plan: selectedPlan, name, email, wechat, notes, lang: currentLang })
        });

        let data;
        try { data = await resp.json(); }
        catch (e) {
          alert(currentLang === 'en' ? 'Server response error, please retry.' : '服务器响应格式错误，请稍后重试');
          resetBtn(submitBtn, total, SYM);
          return;
        }

        if (!data.success) {
          alert((currentLang === 'en' ? 'Order creation failed: ' : '订单创建失败: ') + (data.error || (currentLang === 'en' ? 'Unknown error' : '未知错误')));
          resetBtn(submitBtn, total, SYM);
          return;
        }

        if (data.mode === 'demo') {
          showDemoResult(data, selectedPlugins, selectedPlan, count, total, name, email);
        } else if (data.mode === 'xunhu') {
          localStorage.setItem('autophoto_order_' + data.orderNo, JSON.stringify({
            plugins: selectedPlugins, plan: selectedPlan, count, total, name, email
          }));
          window.location.href = data.paymentUrl;
        } else if (data.mode === 'stripe') {
          localStorage.setItem('autophoto_order_' + data.orderNo, JSON.stringify({
            plugins: selectedPlugins, plan: selectedPlan, count, totalUsd: data.totalUsd, name, email
          }));
          window.location.href = data.url;
        }
      } catch (err) {
        let errDetail = currentLang === 'en' ? 'Network error, please retry.' : '网络错误，请稍后重试';
        if (!navigator.onLine) errDetail = currentLang === 'en' ? 'No internet connection.' : '网络已断开，请检查网络连接';
        alert(errDetail + '\n' + err.message);
        resetBtn(submitBtn, total, SYM);
      }
    }

    function resetBtn(btn, total, sym) {
      btn.disabled = false;
      btn.innerHTML = currentLang === 'en'
        ? `🛒 Pay Now (${sym}${total})`
        : `🛒 前往支付（${sym}${total}）`;
    }

    function showDemoResult(data, plugins, plan, count, total, name, email) {
      const NAMES = getPluginNames();
      const SYM = getCurrencySymbol();
      const codes = data.licenseCodesLabeled || [];
      const planLabel = { testpay:'Test', trial:'Trial', annual:'Annual', permanent:'Lifetime' }[plan];
      document.querySelector('.checkout-section').innerHTML = `
<div class="result-page">
  <div class="result-card">
    <div class="result-icon">🎉</div>
    <h2>${currentLang === 'en' ? 'Demo Mode: Order Created' : '演示模式：订单已创建'}</h2>
    <p>${currentLang === 'en'
      ? 'Payment gateway not yet configured. This is a demo preview.'
      : '虎皮椒后端未配置，此为演示效果。正式版将跳转至支付页。'}</p>
    <div style="background:rgba(99,102,241,0.08);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:left;font-size:14px;color:var(--text-muted);">
      <div style="margin-bottom:6px;"><strong>${currentLang === 'en' ? 'Plugins' : '插件'}：</strong>${plugins.map(p=>NAMES[p]||p).join(', ')}</div>
      <div style="margin-bottom:6px;"><strong>${currentLang === 'en' ? 'License' : '授权'}：</strong>${planLabel} × ${count}</div>
      <div style="margin-bottom:6px;"><strong>${currentLang === 'en' ? 'Total' : '应付'}：</strong>${SYM}${total}</div>
      <div style="margin-bottom:6px;"><strong>Email：</strong>${email}</div>
      <div style="margin-top:12px;color:var(--success);font-weight:700;">🎁 ${currentLang === 'en' ? 'License Keys (demo)' : '授权码（演示）'}：</div>
      ${codes.map(c=>`<div style="font-family:monospace;color:var(--primary-light);margin-top:4px;">${c}</div>`).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:20px;">
      <a href="index.html" class="btn btn-primary btn-block">${currentLang === 'en' ? 'Back to Home' : '返回首页'}</a>
    </div>
  </div>
</div>`;
    }
  </script>

  <script src="/js/i18n.js"></script>
</body>
</html>

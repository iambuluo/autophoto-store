<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付成功 · AutoPhoto</title>
  <link rel="stylesheet" href="https://autophoto.store/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">AutoPhoto<span class="logo-dot">.store</span></a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="index.html#plugins">插件</a>
        <a href="pricing.html">定价</a>
        <a href="about.html">关于</a>
      </div>
      <a href="index.html" class="btn btn-primary btn-sm">返回首页</a>
    </div>
  </nav>

  <div class="result-page">
    <div class="result-card">
      <div class="result-icon">🎉</div>
      <h2>支付成功！</h2>
      <p>感谢您的购买！授权码已发送到您的邮箱。<br>如未收到邮件，请检查垃圾箱或联系微信 <strong>auto_photo2025</strong>。</p>
      <div id="order-info" style="background:rgba(99,102,241,0.08);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:left;font-size:14px;color:var(--text-muted);margin-bottom:16px;">
        <div style="margin-bottom:6px;"><strong>订单号：</strong><span id="order-no">—</span></div>
        <div style="margin-bottom:6px;"><strong>授权类型：</strong><span id="plan-name">—</span></div>
        <div><strong>金额：</strong><span id="amount">—</span></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <a href="index.html" class="btn btn-outline btn-block">返回首页</a>
        <a href="pricing.html" class="btn btn-primary btn-block">继续购买</a>
      </div>
      <p class="text-sm text-muted" style="margin-top:16px;">💬 有问题？微信：auto_photo2025 · 邮件：tourinn@gmail.com</p>
    </div>
  </div>

  <script>
    // 从URL获取订单号
    const params = new URLSearchParams(window.location.search);
    const orderNo = params.get('order');

    if (orderNo) {
      document.getElementById('order-no').textContent = orderNo;
      // 查询订单详情
      fetch(`/api/order/${orderNo}`)
        .then(r => r.json())
        .then(data => {
          if (data.success && data.order) {
            const o = data.order;
            document.getElementById('plan-name').textContent = o.planName;
            document.getElementById('amount').textContent = `¥${o.total}`;
          }
        })
        .catch(() => {});
    }
  </script>
</body>
</html>

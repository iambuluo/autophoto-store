<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购买流程完整测试</title>
  <style>
    body { font-family: system-ui; padding: 20px; max-width: 900px; margin: 0 auto; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #333; }
    .step { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px solid #eee; }
    .step:last-child { border-bottom: none; }
    .step-num { width: 32px; height: 32px; background: #007bff; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 16px; }
    .step-content { flex: 1; }
    .step-result { font-size: 14px; margin-top: 8px; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
    .pending { color: #ffc107; }
    button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    pre { background: #f0f0f0; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
  </style>
</head>
<body>
  <h1>🧪 购买流程完整测试</h1>
  <p>模拟完整的前端 → API → 响应流程</p>

  <div class="card">
    <h3>测试步骤</h3>
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-content">
        <strong>选择插件</strong>
        <div class="step-result" id="step1">⏳ 待测试</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-content">
        <strong>选择授权类型</strong>
        <div class="step-result" id="step2">⏳ 待测试</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-content">
        <strong>填写表单（姓名、邮箱）</strong>
        <div class="step-result" id="step3">⏳ 待测试</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-content">
        <strong>点击购买 → 调用 API</strong>
        <div class="step-result" id="step4">⏳ 待测试</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">5</div>
      <div class="step-content">
        <strong>获取支付链接/二维码</strong>
        <div class="step-result" id="step5">⏳ 待测试</div>
      </div>
    </div>
  </div>

  <button onclick="runFullTest()" id="runBtn">🚀 开始完整测试</button>

  <div class="card" id="resultCard" style="display:none">
    <h3>📊 测试结果</h3>
    <pre id="resultData"></pre>
  </div>

  <script>
    const API_URL = window.location.origin;

    async function testStep(num, name, fn) {
      const el = document.getElementById('step' + num);
      el.innerHTML = `⏳ ${name}...`;
      try {
        const result = await fn();
        el.innerHTML = `✅ ${name}<br><span class="success">成功: ${JSON.stringify(result).substring(0, 100)}</span>`;
        return result;
      } catch (err) {
        el.innerHTML = `❌ ${name}<br><span class="error">失败: ${err.message}</span>`;
        throw err;
      }
    }

    async function runFullTest() {
      const btn = document.getElementById('runBtn');
      const resultCard = document.getElementById('resultCard');
      const resultData = document.getElementById('resultData');
      
      btn.disabled = true;
      btn.textContent = '⏳ 测试中...';
      resultCard.style.display = 'none';
      
      const testData = {
        steps: [],
        finalResult: null
      };

      try {
        // 步骤1: 选择插件
        const plugins = await testStep(1, '选择插件 (qingying-image)', async () => {
          return { selected: ['qingying-image'] };
        });

        // 步骤2: 选择授权类型
        const plan = await testStep(2, '选择授权类型 (testpay)', async () => {
          return { plan: 'testpay', price: 0.01 };
        });

        // 步骤3: 填写表单
        const form = await testStep(3, '填写表单', async () => {
          return { name: '测试用户', email: 'test@example.com' };
        });

        // 步骤4: 调用API
        const apiResult = await testStep(4, '调用 /api/order-test', async () => {
          const response = await fetch(`${API_URL}/api/order-test`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              plugins: plugins.selected,
              plan: plan.plan,
              name: form.name,
              email: form.email
            })
          });
          
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          
          return await response.json();
        });

        // 步骤5: 获取结果
        await testStep(5, '获取支付信息', async () => {
          if (!apiResult.success) {
            throw new Error(apiResult.error || '未知错误');
          }
          return {
            orderNo: apiResult.orderNo,
            total: apiResult.total,
            licenseCodes: apiResult.licenseCodesLabeled
          };
        });

        testData.finalResult = apiResult;
        resultData.textContent = JSON.stringify(apiResult, null, 2);
        resultCard.style.display = 'block';
        
        btn.textContent = '✅ 测试完成';
        
      } catch (err) {
        btn.textContent = '❌ 测试失败';
        console.error(err);
      }
      
      btn.disabled = false;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API测试</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #333; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 24px; }
    button { background: #4CAF50; color: white; border: none; padding: 16px 32px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; }
    button:hover { background: #45a049; }
    button:disabled { background: #ccc; }
    pre { background: #f0f0f0; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; max-height: 400px; overflow-y: auto; }
    .success { border-left: 4px solid #4CAF50; }
    .error { border-left: 4px solid #f44336; }
    .info { border-left: 4px solid #2196F3; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #4CAF50; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .result { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🔧 API测试</h1>
  <p class="subtitle">测试订单创建API</p>

  <div class="card">
    <h3>API 端点</h3>
    <p>POST <code>/api/order-test</code></p>
  </div>

  <button onclick="runTest()" id="testBtn">
    🚀 运行测试
  </button>

  <div id="result" class="result"></div>

  <script>
    async function runTest() {
      const btn = document.getElementById('testBtn');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>测试中...';
      result.innerHTML = '<div class="card info"><p>正在发送请求...</p></div>';

      const startTime = Date.now();

      try {
        const response = await fetch('/api/order-test', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            plugins: ['qingying-image'],
            plan: 'testpay',
            name: '测试',
            email: 'test@example.com'
          })
        });

        const endTime = Date.now();
        const duration = endTime - startTime;
        const data = await response.json();

        if (response.ok && data.success) {
          result.innerHTML = `
            <div class="card success">
              <h2>✅ 测试成功!</h2>
              <p><strong>HTTP状态:</strong> ${response.status}</p>
              <p><strong>响应时间:</strong> ${duration}ms</p>
              <p><strong>订单号:</strong> ${data.orderNo}</p>
              <p><strong>金额:</strong> ¥${data.total}</p>
              <p><strong>授权码:</strong></p>
              <pre>${data.licenseCodesLabeled ? data.licenseCodesLabeled.join('\n') : 'N/A'}</pre>
            </div>
          `;
        } else {
          result.innerHTML = `
            <div class="card error">
              <h2>❌ API返回错误</h2>
              <p><strong>HTTP状态:</strong> ${response.status}</p>
              <p><strong>错误:</strong> ${data.error}</p>
            </div>
          `;
        }

      } catch (error) {
        result.innerHTML = `
          <div class="card error">
            <h2>❌ 请求失败</h2>
            <p><strong>错误:</strong> ${error.message}</p>
          </div>
        `;
      }

      btn.disabled = false;
      btn.innerHTML = '🚀 重新运行测试';
    }
  </script>
</body>
</html>

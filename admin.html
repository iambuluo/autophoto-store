<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - AutoPhoto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header h1 { font-size: 24px; margin-bottom: 10px; }
    .stats { display: flex; gap: 20px; margin-top: 15px; }
    .stat { background: #e3f2fd; padding: 15px 25px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: bold; color: #1976d2; }
    .stat-label { color: #666; font-size: 14px; margin-top: 5px; }
    
    .search-box { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .search-box input:focus { outline: none; border-color: #1976d2; }
    
    .orders { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    .order { padding: 20px; border-bottom: 1px solid #eee; }
    .order:last-child { border-bottom: none; }
    .order:hover { background: #fafafa; }
    
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .order-no { font-family: monospace; font-weight: bold; color: #1976d2; }
    .order-date { color: #999; font-size: 14px; }
    .order-status { background: #4caf50; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    
    .order-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .info-item { font-size: 14px; }
    .info-label { color: #666; }
    
    .license-codes { background: #f8f9fa; padding: 12px; border-radius: 8px; }
    .license-codes h4 { font-size: 14px; color: #666; margin-bottom: 8px; }
    .code { font-family: monospace; background: #e8f5e9; padding: 6px 10px; border-radius: 4px; margin: 4px 4px 4px 0; display: inline-block; font-size: 13px; }
    
    .loading { text-align: center; padding: 40px; color: #666; }
    .empty { text-align: center; padding: 60px; color: #999; }
    .empty-icon { font-size: 48px; margin-bottom: 15px; }
    
    .error { background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    
    .refresh-btn { background: #1976d2; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .refresh-btn:hover { background: #1565c0; }
    
    @media (max-width: 768px) {
      .stats { flex-wrap: wrap; }
      .stat { flex: 1; min-width: 120px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📦 AutoPhoto 订单管理</h1>
      <p style="color:#666;">查询所有订单和授权码</p>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="total-orders">-</div>
          <div class="stat-label">总订单数</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="today-orders">-</div>
          <div class="stat-label">今日订单</div>
        </div>
      </div>
    </div>
    
    <div class="search-box">
      <input type="text" id="search" placeholder="🔍 搜索订单号、姓名、邮箱或授权码..." oninput="filterOrders()">
    </div>
    
    <div class="error" id="error" style="display:none;"></div>
    
    <div class="orders" id="orders-list">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    let allOrders = [];
    
    async function loadOrders() {
      try {
        document.getElementById('orders-list').innerHTML = '<div class="loading">加载中...</div>';
        document.getElementById('error').style.display = 'none';
        
        const resp = await fetch('/api/admin/orders');
        const data = await resp.json();
        
        if (!data.success) throw new Error(data.error || '加载失败');
        
        allOrders = data.orders || [];
        renderOrders(allOrders);
        updateStats();
        
      } catch (e) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = '加载失败: ' + e.message;
        document.getElementById('orders-list').innerHTML = '<div class="empty"><div class="empty-icon">😢</div>加载失败<br><small>' + e.message + '</small></div>';
      }
    }
    
    function renderOrders(orders) {
      const container = document.getElementById('orders-list');
      
      if (orders.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无订单</div>';
        return;
      }
      
      container.innerHTML = orders.map(order => `
        <div class="order">
          <div class="order-header">
            <div>
              <span class="order-no">${order.orderNo}</span>
              <span class="order-status">已完成</span>
            </div>
            <span class="order-date">${new Date(order.createdAt).toLocaleString('zh-CN')}</span>
          </div>
          
          <div class="order-info">
            <div class="info-item"><span class="info-label">客户：</span>${order.name}</div>
            <div class="info-item"><span class="info-label">邮箱：</span>${order.email}</div>
            <div class="info-item"><span class="info-label">插件：</span>${order.pluginNames?.join('、') || order.plugins?.join('、')}</div>
            <div class="info-item"><span class="info-label">类型：</span>${order.planName}</div>
            <div class="info-item"><span class="info-label">金额：</span>¥${order.total}</div>
          </div>
          
          <div class="license-codes">
            <h4>📜 授权码：</h4>
            ${(order.licenseCodesLabeled || order.licenseCodes || []).map(code => 
              `<span class="code">${code}</span>`
            ).join('')}
          </div>
        </div>
      `).join('');
    }
    
    function updateStats() {
      document.getElementById('total-orders').textContent = allOrders.length;
      
      const today = new Date().toDateString();
      const todayOrders = allOrders.filter(o => new Date(o.createdAt).toDateString() === today);
      document.getElementById('today-orders').textContent = todayOrders.length;
    }
    
    function filterOrders() {
      const keyword = document.getElementById('search').value.toLowerCase().trim();
      
      if (!keyword) {
        renderOrders(allOrders);
        return;
      }
      
      const filtered = allOrders.filter(order => {
        return (
          order.orderNo?.toLowerCase().includes(keyword) ||
          order.name?.toLowerCase().includes(keyword) ||
          order.email?.toLowerCase().includes(keyword) ||
          order.licenseCodes?.some(c => c.toLowerCase().includes(keyword)) ||
          order.licenseCodesLabeled?.some(c => c.toLowerCase().includes(keyword))
        );
      });
      
      renderOrders(filtered);
    }
    
    // 页面加载时获取订单
    loadOrders();
  </script>
</body>
</html>

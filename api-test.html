<!DOCTYPE html>
<html>
<head><title>API Test</title></head>
<body>
<h2>API Test</h2>
<div id="result">Testing...</div>
<script>
const payload = JSON.stringify({
  plugins: ['shijuezhongguo'],
  plan: 'trial',
  name: '测试用户',
  email: 'test@example.com'
});

fetch('/api/order-create', {
  method: 'POST',
  headers: {'Content-Type': 'application/json'},
  body: payload
})
.then(r => r.json())
.then(d => {
  document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(d, null, 2) + '</pre>';
  if (d.success) {
    document.body.style.background = '#d4edda';
    document.title = '✅ API OK - ' + d.mode;
  } else {
    document.body.style.background = '#f8d7da';
    document.title = '❌ API Error';
  }
})
.catch(e => {
  document.getElementById('result').innerHTML = '<pre style="color:red">Error: ' + e.message + '</pre>';
  document.body.style.background = '#fff3cd';
  document.title = '❌ Network Error';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head><title>API测试</title></head>
<body>
<h2>测试 order-create API</h2>
<button onclick="testApi()">点击测试</button>
<pre id="result">点击按钮开始测试...</pre>
<script>
async function testApi() {
  const result = document.getElementById('result');
  result.textContent = '正在测试...';
  try {
    const r = await fetch('https://autophoto-store.vercel.app/api/order-create', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        plugins: ['shijuezhongguo'],
        plan: 'testpay',
        name: '测试',
        email: 'test@test.com'
      })
    });
    const data = await r.json();
    result.textContent = '✅ mode: ' + data.mode + '\n' + JSON.stringify(data, null, 2);
  } catch(e) {
    result.textContent = '❌ ERROR: ' + e.message;
  }
}
</script>
</body>
</html>
